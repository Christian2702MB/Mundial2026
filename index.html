<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Mundial de Fútbol 2026 - Polla Familiar</title>
    <!-- Tailwind CSS para diseño de TV deportiva de alto rendimiento -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #f8fafc; overflow-x: hidden; transition: background-color 0.3s ease; }
        .tab-active { border-bottom-color: #22c55e; color: #22c55e; }
        
        /* --- ANIMACIONES INTERACTIVAS Y TRANSICIONES --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes earthquake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-4px) rotate(-0.5deg); }
            40% { transform: translateX(4px) rotate(0.5deg); }
        }
        @keyframes floatWarning {
            0%, 100% { transform: translateY(0); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2); border-color: rgba(245, 158, 11, 0.4); }
            50% { transform: translateY(-4px); box-shadow: 0 8px 22px rgba(245, 158, 11, 0.4); border-color: rgba(245, 158, 11, 0.7); }
        }
        @keyframes energyFlow {
            0% { border-color: #22c55e; filter: drop-shadow(0 0 8px rgba(34, 197, 94, 0.9)); }
            100% { border-color: rgba(71, 85, 105, 0.4); filter: drop-shadow(0 0 0 transparent); }
        }
        @keyframes pulseAlert {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(0.96); }
        }

        .card-animate { animation: fadeInUp 0.4s ease-out both; }
        .status-capilla { animation: floatWarning 2.5s infinite ease-in-out; background: linear-gradient(135deg, #151426 0%, #0d1220 100%) !important; }
        .status-gameover { filter: grayscale(1) opacity(0.35) contrast(0.8); background: #070a12 !important; border-color: rgba(239, 68, 68, 0.15) !important; }
        
        .country-box { transition: all 0.25s ease; }
        .country-dead-style { filter: grayscale(0.8) opacity(0.4); text-decoration: line-through; color: #475569; }
        .animate-energy-flow { animation: energyFlow 1.2s ease-out forwards; }
        .badge-today { animation: pulseAlert 1.8s infinite ease-in-out; }
        
        /* Modo Captura Estricto */
        .screenshot-mode .hide-on-screenshot { display: none !important; }
        .screenshot-mode { background-color: #060911 !important; padding: 12px !important; }

        /* Scrollbar premium */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #0b0f19; }
        ::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #334155; }
    </style>
</head>
<body class="p-4 md:p-8 font-sans transition-all duration-300" id="main-body">

    <!-- Banner de Notificación de Modo Captura -->

        📸 Modo Captura - Toca para salir
    </div>

    <!-- Encabezado Principal Premium UI/UX -->

        </div>
        <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 via-cyan-400 to-blue-500 uppercase tracking-wider mb-1">

        <div class="flex items-center justify-center gap-3 mb-2">

                v5.9.1 - Pixel Perfect
            </span>
            <div class="bg-gradient-to-r from-yellow-500 to-amber-500 text-slate-950 font-black text-xs px-4 py-0.5 rounded-full shadow-lg">
                💰 POZO: S/. 400
            </div>
        </div>
    </div>

    <!-- Pestañas de Navegación -->
    <div class="max-w-6xl mx-auto flex border-b border-slate-800 mb-6 text-sm md:text-base font-black tracking-wide hide-on-screenshot">
        <button onclick="switchTab('polla')" id="btn-tab-polla" class="flex-1 py-3 text-center border-b-4 transition-all duration-200 text-green-400 border-green-500">
            📊 Mis Elecciones
        </button>
        <button onclick="switchTab('avance')" id="btn-tab-avance" class="flex-1 py-3 text-center border-b-4 transition-all duration-200 text-slate-400 border-transparent hover:text-slate-200">
            🏆 Avance del Torneo
        </button>
    </div>

    <!-- Layout General -->
    <div class="max-w-6xl mx-auto">
        
        <!-- PESTAÑA 1: POSICIONES + CONTROLES CONTEXTUALES -->
        <div id="tab-content-polla" class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            
            <!-- Columna de Control Técnico y Boletín -->
            <div class="space-y-4 h-fit lg:col-span-1 hide-on-screenshot">
                <!-- Panel Técnico Opciones -->
                <div class="bg-slate-900/90 p-4 rounded-2xl shadow-2xl border border-slate-800 backdrop-blur-md transition-all duration-300">
                    <button onclick="toggleControlPanel()" class="w-full flex justify-between items-center text-left focus:outline-none py-1 group">

                        </div>
                        <span id="panel-arrow" class="text-[10px] font-bold bg-slate-800 text-slate-400 px-2 py-0.5 rounded border border-slate-700">🔽 MOSTRAR</span>
                    </button>
                    
                    <div id="panel-content" class="hidden mt-4 pt-3 border-t border-slate-800/60">

                        <div id="country-controls" class="space-y-1.5 max-h-[280px] overflow-y-auto pr-1"></div>
                    </div>
                </div>

                <!-- Boletín del Drama Familiar Estático -->
                <div class="bg-slate-900/40 border border-slate-800/80 rounded-2xl p-4">
                    <h3 class="text-xs font-black text-slate-400 tracking-wider uppercase mb-2.5 flex items-center gap-1.5">
                        <span>📢</span> Estado en Vivo de la Familia
                    </h3>
                    <div id="family-drama-ticker" class="space-y-2 text-[11px] max-h-[260px] overflow-y-auto pr-1"></div>
                </div>
            </div>

            <!-- Leaderboard Cards -->
            <div id="leaderboard-cards" class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4 h-fit"></div>
        </div>

        <!-- PESTAÑA 2: AVANCE DEL TORNEO -->
        <div id="tab-content-avance" class="bg-slate-900/40 p-3 sm:p-5 rounded-2xl border border-slate-800 hidden max-w-4xl mx-auto w-full overflow-hidden">
            <div class="flex flex-col sm:flex-row justify-between sm:items-center border-b border-slate-800 pb-3 mb-4 gap-2">
                <div>
                    <h2 class="text-base font-black text-slate-200">🔀 Simulador de Llaves Directas</h2>
                    <div id="live-pool-counter" class="text-[10px] text-emerald-400 font-bold mt-0.5"></div>
                </div>
                
                <div class="flex bg-slate-950 p-1 rounded-lg border border-slate-800 text-[10px] sm:text-[11px] font-bold overflow-x-auto hide-on-screenshot">

                    <button onclick="filterRound(8)" id="r-btn-8" class="px-2 py-1 rounded text-slate-400 whitespace-nowrap">Octavos</button>
                    <button onclick="filterRound(4)" id="r-btn-4" class="px-2 py-1 rounded text-slate-400 whitespace-nowrap">Cuartos</button>
                    <button onclick="filterRound(2)" id="r-btn-2" class="px-2 py-1 rounded text-slate-400 whitespace-nowrap">Semifinal</button>
                    <button onclick="filterRound(1)" id="r-btn-1" class="px-2 py-1 rounded text-slate-400 whitespace-nowrap">🔥 Final</button>
                </div>
            </div>
            
            <div id="bracket-matches-container" class="space-y-4 w-full"></div>
            
            <div class="mt-6 pt-4 border-t border-slate-800/80 flex justify-end hide-on-screenshot">
                <button onclick="resetSimulation()" class="flex items-center gap-1.5 text-[10px] font-black uppercase tracking-wider bg-rose-950/30 text-rose-400 hover:bg-rose-900/40 border border-rose-900/40 px-3 py-1.5 rounded-lg transition-all active:scale-95">
                    <span>🗑️</span> Reiniciar Predicciones de Cruces
                </button>
            </div>
        </div>

    </div>

    <!-- BOTÓN FLOTANTE MODO FOTO WHATSAPP (Mejorado con Icono Sólido de Alta Fidelidad UI) -->
    <button onclick="enterScreenshotMode(event)" id="btn-screenshot-float" class="hide-on-screenshot fixed bottom-6 right-6 bg-gradient-to-r from-green-500 to-emerald-600 hover:from-green-400 hover:to-emerald-500 text-slate-950 p-3.5 rounded-full shadow-[0_8px_30px_rgba(34,197,94,0.4)] transition-all transform hover:scale-110 active:scale-95 z-50 flex items-center justify-center" title="Modo Captura WhatsApp">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" class="w-6 h-6">
            <path d="M12 9a3.75 3.75 0 1 0 0 7.5A3.75 3.75 0 0 0 12 9Z" />
            <path fill-rule="evenodd" d="M9.344 3.071a.45 .45 0 0 1 .896 0L10.74 5.5h2.521l.5-2.429a.45 .45 0 0 1 .896 0L15.157 5.5h2.593c1.242 0 2.25 1.008 2.25 2.25v10.5c0 1.242-1.008 2.25-2.25 2.25H6.25a2.25 2.25 0 0 1-2.25-2.25V7.75c0-1.242 1.008-2.25 2.25-2.25h2.593l.5-2.429ZM12 7.5a5.25 5.25 0 1 0 0 10.5 5.25 5.25 0 0 0 0-10.5Z" clip-rule="evenodd" />
        </svg>
    </button>

    <script>

        ];

        // Sincronización limpia del glosario de banderas
        const flags = { "Japón": "🇯🇵", "Inglaterra": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Argentina": "🇦🇷", "Brasil": "🇧🇷", "Portugal": "🇵🇹", "Marruecos": "🇲🇦", "Alemania": "🇩🇪", "España": "🇪🇸", "Francia": "🇫🇷", "Holanda": "🇳🇱", "Suecia": "🇸🇪", "Sudáfrica": "🇿🇦", "Canadá": "🇨🇦", "Países Bajos": "🇳🇱", "Croacia": "🇭🇷", "Austria": "🇦🇹", "Estados Unidos": "🇺🇸", "Bosnia": "🇧🇦", "Bélgica": "🇧🇪", "Senegal": "🇸🇳", "Costa de Marfil": "🇨🇮", "Noruega": "🇳🇴", "México": "🇲🇽", "Ecuador": "🇪🇨", "RD Congo": "🇨🇩", "Cabo Verde": "🇨🇻", "Australia": "🇦🇺", "Egipto": "🇪🇬", "Suiza": "🇨🇭", "Argelia": "🇩🇿", "Colombia": "🇨🇴", "Ghana": "🇬🇭", "Paraguay": "🇵🇾", "Por definir": "🏳️" };

        let countryStatus = JSON.parse(localStorage.getItem('wc2026_status_v6')) || {
            "Japón": false, "Alemania": false, "Inglaterra": true, "Argentina": true, "Brasil": true, "Portugal": true, "Marruecos": true, "España": true, "Francia": true, "Holanda": true
        };

        const initialSimData = {
            r16: [
                { id: 1, t1: "Alemania", t2: "Paraguay", w: "Paraguay", date: "29 JUN" },
                { id: 2, t1: "Francia", t2: "Suecia", w: "Francia", date: "30 JUN" },
                { id: 3, t1: "Sudáfrica", t2: "Canadá", w: "Canadá", date: "28 JUN" },
                { id: 4, t1: "Países Bajos", t2: "Marruecos", w: "Marruecos", date: "29 JUN" },
                { id: 5, t1: "Portugal", t2: "Croacia", w: null, date: "2 JUL" },
                { id: 6, t1: "España", t2: "Austria", w: null, date: "2 JUL" },
                { id: 7, t1: "Estados Unidos", t2: "Bosnia", w: null, date: "1 JUL" },
                { id: 8, t1: "Bélgica", t2: "Senegal", w: null, date: "1 JUL" },
                { id: 9, t1: "Brasil", t2: "Japón", w: "Brasil", date: "29 JUN" },
                { id: 10, t1: "Costa de Marfil", t2: "Noruega", w: null, date: "30 JUN" },
                { id: 11, t1: "México", t2: "Ecuador", w: null, date: "30 JUN" },
                { id: 12, t1: "Inglaterra", t2: "RD Congo", w: null, date: "1 JUL" },
                { id: 13, t1: "Argentina", t2: "Cabo Verde", w: null, date: "3 JUL" },
                { id: 14, t1: "Australia", t2: "Egipto", w: null, date: "3 JUL" },
                { id: 15, t1: "Suiza", t2: "Argelia", w: null, date: "2 JUL" },
                { id: 16, t1: "Colombia", t2: "Ghana", w: null, date: "3 JUL" }
            ],
            r8: [
                { id: 1, t1: "Por definir", t2: "Por definir", w: null, date: "4 JUL", time: "2:00 p.m." },
                { id: 2, t1: "Por definir", t2: "Por definir", w: null, date: "4 JUL", time: "7:00 p.m." },
                { id: 3, t1: "Por definir", t2: "Por definir", w: null, date: "6 JUL", time: "7:00 p.m." },
                { id: 4, t1: "Por definir", t2: "Por definir", w: null, date: "6 JUL", time: "2:00 p.m." },
                { id: 5, t1: "Por definir", t2: "Por definir", w: null, date: "5 JUL", time: "3:00 p.m." },
                { id: 6, t1: "Por definir", t2: "Por definir", w: null, date: "5 JUL", time: "7:00 p.m." },
                { id: 7, t1: "Por definir", t2: "Por definir", w: null, date: "7 JUL", time: "11:00 a.m." },
                { id: 8, t1: "Por definir", t2: "Por definir", w: null, date: "7 JUL", time: "3:00 p.m." }
            ],
            r4: Array(4).fill(null).map((_, i) => ({ id: i+1, t1: "Por definir", t2: "Por definir", w: null, date: "9 JUL - 11 JUL", time: "Por confirmar" })),
            r2: Array(2).fill(null).map((_, i) => ({ id: i+1, t1: "Por definir", t2: "Por definir", w: null, date: i === 0 ? "14 JUL" : "15 JUL", time: "2:00 / 7:00 p.m." })),
            r1: [{ id: 1, t1: "Por definir", t2: "Por definir", w: null, date: "19 JUL", time: "2:00 p.m. FINAL" }]
        };

        let simulationData = JSON.parse(localStorage.getItem('wc2026_sim_v6')) || JSON.parse(JSON.stringify(initialSimData));
        let currentActiveRound = 8; 
        let previousLivesState = {};
        let lastClickedBracket = null;
        let isScreenshotModeActive = false;

        const isToday = (matchDateString) => {
            const now = new Date();
            const months = { "ENE": 0, "FEB": 1, "MAR": 2, "ABR": 3, "MAY": 4, "JUN": 5, "JUL": 6, "AGO": 7, "SET": 8, "OCT": 9, "NOV": 10, "DIC": 11 };
            const parts = matchDateString.trim().split(" ");
            if (parts.length < 2) return false;
            const day = parseInt(parts[0], 10);
            const monthStr = parts[1].toUpperCase();
            return now.getDate() === day && now.getMonth() === months[monthStr];
        };

        function toggleControlPanel() {
            const content = document.getElementById('panel-content');
            const arrow = document.getElementById('panel-arrow');
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                arrow.innerHTML = '🔼 OCULTAR';
            } else {
                content.classList.add('hidden');
                arrow.innerHTML = '🔽 MOSTRAR';
            }
        }

        function switchTab(tab) {
            const pollaContent = document.getElementById('tab-content-polla');
            const avanceContent = document.getElementById('tab-content-avance');
            const btnPolla = document.getElementById('btn-tab-polla');
            const btnAvance = document.getElementById('btn-tab-avance');

            if(tab === 'polla') {
                pollaContent.classList.remove('hidden');
                avanceContent.classList.add('hidden');
                btnPolla.className = "flex-1 py-3 text-center border-b-4 transition-all duration-200 text-green-400 border-green-500 font-black tracking-wide";
                btnAvance.className = "flex-1 py-3 text-center border-b-4 transition-all duration-200 text-slate-400 border-transparent hover:text-slate-200 font-black tracking-wide";
            } else {
                pollaContent.classList.add('hidden');
                avanceContent.classList.remove('hidden');
                btnAvance.className = "flex-1 py-3 text-center border-b-4 transition-all duration-200 text-green-400 border-green-500 font-black tracking-wide";
                btnPolla.className = "flex-1 py-3 text-center border-b-4 transition-all duration-200 text-slate-400 border-transparent hover:text-slate-200 font-black tracking-wide";
                renderAvanceTorneo(); 
            }
        }

        function filterRound(round) {
            currentActiveRound = round;
            [16, 8, 4, 2, 1].forEach(r => {
                const btn = document.getElementById(`r-btn-${r}`);
                if(r === round) { btn.className = "px-2 py-1 rounded bg-slate-800 text-green-400"; }
                else { btn.className = "px-2 py-1 rounded text-slate-400"; }
            });
            renderAvanceTorneo();
        }

        function renderControls() {
            const container = document.getElementById('country-controls');
            if (!container) return;
            
            const htmlString = Object.keys(countryStatus).sort().map(country => {
                const isAlive = countryStatus[country];
                const btnClass = isAlive ? 'bg-emerald-600' : 'bg-rose-600';
                return `
                    <div class="flex justify-between items-center bg-slate-950/40 p-2 rounded-xl border border-slate-800/60">
                        <span class="font-bold text-xs text-slate-300">${country}</span>
                        <button onclick="toggleCountry('${country}')" class="${btnClass} text-white text-[10px] font-black px-3 py-1 rounded-lg transition-all transform active:scale-95">
                            ${isAlive ? 'VIVO' : 'ELIMINADO'}
                        </button>
                    </div>
                `;
            }).join('');
            container.innerHTML = htmlString;
        }

        function renderPollaBoard(triggerShakeFor) {
            const container = document.getElementById('leaderboard-cards');
            if (!container) return;

            const leaderboard = participants.map(p => {
                const c1Alive = countryStatus[p.c1];
                const c2Alive = countryStatus[p.c2];
                const lives = (c1Alive ? 1 : 0) + (c2Alive ? 1 : 0);
                return { ...p, lives, c1Alive, c2Alive };
            }).sort((a, b) => b.lives - a.lives);

            const htmlString = leaderboard.map((p, index) => {
                let stateClass = 'border-slate-800 bg-slate-900/40';
                let badge = "";
                let heartIcons = "";

                if (p.lives === 2) {
                    badge = `<span class="bg-emerald-500/10 text-emerald-400 text-[11px] px-2.5 py-0.5 rounded-full border border-emerald-500/20 font-black">PUESTO #${index + 1}</span>`;
                    heartIcons = "❤️❤️";
                } else if (p.lives === 1) {
                    stateClass = 'status-capilla';
                    badge = `<span class="bg-amber-500/20 text-amber-400 text-[11px] px-2.5 py-0.5 rounded-full border border-amber-500/30 font-black">⚠️ CAPILLA</span>`;
                    heartIcons = "❤️🖤";
                } else {
                    stateClass = 'status-gameover';
                    badge = `<span class="bg-slate-950 text-slate-500 text-[11px] px-2.5 py-0.5 rounded-full border border-slate-800 font-bold">💀 FUERA</span>`;
                    heartIcons = "🖤🖤";
                }

                if (triggerShakeFor === p.name) { stateClass += ' status-gameover'; }

                return `
                    <div class="card-animate ${stateClass} p-4 rounded-xl border shadow-xl transition-all" style="animation-delay: ${index * 0.02}s">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-mono font-bold text-slate-500">${p.lives === 0 ? '❌' : (index == 0 ? '👑' : `#${index + 1}`)}</span>
                                <h3 class="text-base font-black text-slate-200 uppercase">${p.name}</h3>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-xs tracking-wider font-mono">${heartIcons}</span>
                                ${badge}
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div class="country-box p-2.5 rounded-lg bg-slate-950/40 border border-slate-800/40 flex items-center justify-center gap-2 ${!p.c1Alive ? 'country-dead-style' : 'text-slate-200 font-bold'}">
                                <span class="text-lg flex-shrink-0">${p.flag1}</span>
                                <span class="text-xs tracking-wide truncate">${p.c1}</span>
                            </div>
                            <div class="country-box p-2.5 rounded-lg bg-slate-950/40 border border-slate-800/40 flex items-center justify-center gap-2 ${!p.c2Alive ? 'country-dead-style' : 'text-slate-200 font-bold'}">
                                <span class="text-lg flex-shrink-0">${p.flag2}</span>
                                <span class="text-xs tracking-wide truncate">${p.c2}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            container.innerHTML = htmlString;
        }

        function renderDramaTicker() {
            const container = document.getElementById('family-drama-ticker');
            if (!container) return;
            
            const htmlString = participants.map(p => {
                const c1Alive = countryStatus[p.c1];
                const c2Alive = countryStatus[p.c2];
                const lives = (c1Alive ? 1 : 0) + (c2Alive ? 1 : 0);
                
                if (lives === 2) {
                    return `<div class="bg-emerald-950/20 text-emerald-400 p-2 rounded border border-emerald-950 flex items-center gap-2 font-medium">🔥 <span class="font-black uppercase">${p.name}</span> sigue invicto con sus dos vidas intactas.</div>`;
                } else if (lives === 1) {
                    const muerto = !c1Alive ? p.c1 : p.c2;
                    return `<div class="bg-amber-950/20 text-amber-400 p-2 rounded border border-amber-950 flex items-center gap-2 font-medium">⚠️ <span class="font-black uppercase">${p.name}</span> en capilla tras la caída de ${muerto}.</div>`;
                } else {
                    return `<div class="bg-rose-950/20 text-rose-500/80 p-2 rounded border border-rose-950/40 flex items-center gap-2 font-bold line-through opacity-60">💀 <span class="font-black uppercase">${p.name}</span> perdió todas sus vidas y quedó fuera.</div>`;
                }
            }).join('');
            
            container.innerHTML = htmlString;
        }

        function calculateNextRounds() {
            for (let i = 0; i < 8; i++) {
                simulationData.r8[i].t1 = simulationData.r16[i*2].w || "Por definir";
                simulationData.r8[i].t2 = simulationData.r16[i*2 + 1].w || "Por definir";
            }
            for (let i = 0; i < 4; i++) {
                simulationData.r4[i].t1 = simulationData.r8[i*2].w || "Por definir";
                simulationData.r4[i].t2 = simulationData.r8[i*2 + 1].w || "Por definir";
            }
            for (let i = 0; i < 2; i++) {
                simulationData.r2[i].t1 = simulationData.r4[i*2].w || "Por definir";
                simulationData.r2[i].t2 = simulationData.r4[i*2 + 1].w || "Por definir";
            }
            simulationData.r1[0].t1 = simulationData.r2[0].w || "Por definir";
            simulationData.r1[0].t2 = simulationData.r2[1].w || "Por definir";

            [simulationData.r8, simulationData.r4, simulationData.r2, simulationData.r1].forEach(round => {
                round.forEach(m => { if (m.w && m.w !== m.t1 && m.w !== m.t2) m.w = null; });
            });
        }

        function simulateWinner(roundKey, matchId, teamIndex) {
            if(isScreenshotModeActive) return;
            const roundArr = simulationData[roundKey];
            const matchIndex = roundArr.findIndex(m => m.id === matchId);
            const match = roundArr[matchIndex];
            const selectedTeam = teamIndex === 1 ? match.t1 : match.t2;
            
            if (selectedTeam === "Por definir") return;

            if (match.w === selectedTeam) { match.w = null; } 
            else { match.w = selectedTeam; }

            lastClickedBracket = {
                round: roundKey,
                pairIndex: Math.floor(matchIndex / 2)
            };

            saveAndRender();
        }

        function renderAvanceTorneo() {
            const container = document.getElementById('bracket-matches-container');
            if (!container) return;
            
            let currentRoundKey = `r${currentActiveRound}`;
            let currentData = simulationData[currentRoundKey];

            const aliveCount = Object.values(countryStatus).filter(v => v).length;
            const counterDiv = document.getElementById('live-pool-counter');
            if (counterDiv) counterDiv.innerHTML = `📊 Quedan ${aliveCount} de 10 países con vida global en el pozo`;

            const createMatchCard = (m) => {
                if (!m) return '';
                const f1 = flags[m.t1] || "🏳️";
                const f2 = flags[m.t2] || "🏳️";
                const t1Selected = m.w === m.t1 && m.w !== null;
                const t2Selected = m.w === m.t2 && m.w !== null;

                let labelCenterContent = "";
                if (m.t1 === "Por definir" || m.t2 === "Por definir") {
                    labelCenterContent = `<span class="text-[9px] font-black text-slate-500 uppercase tracking-tight">VS</span>`;
                } else if (m.w) {
                    labelCenterContent = `<span class="text-green-400 font-black text-xs">✔</span>`;
                } else if (isToday(m.date)) {
                    labelCenterContent = `
                        <span class="badge-today bg-red-950/60 border border-red-500/40 text-red-400 font-black text-[9px] px-1.5 py-0.5 rounded shadow-[0_0_8px_rgba(239,68,68,0.4)] uppercase tracking-tight mb-0.5">🔥 HOY</span>
                        <span class="text-slate-400 font-mono text-[9px] font-bold">${m.time || ''}</span>
                    `;
                } else {
                    labelCenterContent = `
                        <span class="text-amber-400 font-black text-[10px] tracking-tight mb-0.5">${m.date}</span>
                        <span class="text-slate-400 font-mono text-[9px] font-bold whitespace-nowrap">${m.time || ''}</span>
                    `;
                }

                return `
                    <div class="bg-slate-950/80 border border-slate-800/80 rounded-xl overflow-hidden shadow-md grid grid-cols-12 items-center py-2 transition-all hover:border-slate-700/80">
                        
                        <!-- País 1 -->
                        <div onclick="simulateWinner('${currentRoundKey}', ${m.id}, 1)" 
                             class="col-span-5 p-2 flex items-center gap-2 cursor-pointer hover:bg-slate-900/60 transition-all min-w-0 select-none h-full ${t1Selected ? 'bg-green-500/5' : ''}">
                            <div class="w-3 h-3 rounded-full border transition-all flex-shrink-0 ${t1Selected ? 'bg-green-500 border-green-400 shadow-[0_0_8px_#22c55e]' : 'border-slate-700 bg-transparent'}"></div>
                            <span class="text-base flex-shrink-0">${f1}</span>
                            <div class="flex flex-col min-w-0">
                                <span class="text-xs font-bold text-slate-200 tracking-wide truncate">${m.t1}</span>
                                <span class="text-[9px] text-amber-400/80 font-sans font-medium whitespace-normal break-words leading-tight mt-0.5">${getOwnersText(m.t1)}</span>
                            </div>
                        </div>
                        
                        <!-- Nodo Central Informativo -->
                        <div class="col-span-2 flex flex-col items-center justify-center border-x border-slate-900 h-full py-1 bg-slate-900/30 text-center select-none px-0.5">
                            ${labelCenterContent}
                        </div>

                        <!-- País 2 -->
                        <div onclick="simulateWinner('${currentRoundKey}', ${m.id}, 2)" 
                             class="col-span-5 p-2 flex items-center justify-end gap-2 text-right cursor-pointer hover:bg-slate-900/60 transition-all min-w-0 select-none h-full ${t2Selected ? 'bg-green-500/5' : ''}">
                            <div class="flex flex-col min-w-0 text-right">
                                <span class="text-xs font-bold text-slate-200 tracking-wide truncate">${m.t2}</span>
                                <span class="text-[9px] text-amber-400/80 font-sans font-medium whitespace-normal break-words leading-tight mt-0.5">${getOwnersText(m.t2)}</span>
                            </div>
                            <span class="text-base flex-shrink-0">${f2}</span>
                            <div class="w-3 h-3 rounded-full border transition-all flex-shrink-0 ${t2Selected ? 'bg-green-500 border-green-400 shadow-[0_0_8px_#22c55e]' : 'border-slate-700 bg-transparent'}"></div>
                        </div>
                    </div>
                `;
            };

            let htmlContent = '';

            for (let i = 0; i < currentData.length; i += 2) {
                const match1 = currentData[i];
                const match2 = currentData[i + 1];
                
                const isFlashing = lastClickedBracket && 
                                   lastClickedBracket.round === currentRoundKey && 
                                   lastClickedBracket.pairIndex === (i / 2);
                                   
                const extraLineClass = isFlashing ? "animate-energy-flow" : "border-slate-700/60";

                if (match2) {
                    htmlContent += `
                        <div class="relative bg-slate-950/20 border border-slate-800/40 p-2 rounded-2xl pr-10 sm:pr-12 shadow-inner max-w-[calc(100%-8px)] mx-auto w-full">
                            <div class="space-y-2 relative z-10 w-full">
                                ${createMatchCard(match1)}
                                ${createMatchCard(match2)}
                            </div>
                            
                            <div class="absolute top-0 bottom-0 right-0 w-10 sm:w-12 flex items-center justify-center pointer-events-none z-0">
                                <div class="w-5 sm:w-6 h-1/2 border-r-2 border-y-2 ${extraLineClass} rounded-r-lg absolute left-1"></div>
                                <div class="w-4 sm:w-5 border-t-2 ${extraLineClass} absolute right-0 top-1/2"></div>
                            </div>
                        </div>
                    `;
                } else {
                    htmlContent += `
                        <div class="max-w-xl mx-auto bg-gradient-to-b from-yellow-500/10 to-transparent border border-yellow-500/20 p-3 rounded-2xl shadow-2xl relative overflow-hidden w-full">
                            <div class="text-center text-[10px] font-black text-yellow-400 uppercase tracking-widest mb-2 flex items-center justify-center gap-1">
                                ✨ GRAN FINAL DEL MUNDIAL ✨
                            </div>
                            ${createMatchCard(match1)}
                        </div>
                    `;
                }
            }

            container.innerHTML = htmlContent;
            lastClickedBracket = null;
        }

        function enterScreenshotMode(event) {
            event.stopPropagation();
            isScreenshotModeActive = true;
            document.getElementById('main-body').classList.add('screenshot-mode');
            document.getElementById('screenshot-toast').classList.remove('hidden');
            window.addEventListener('click', exitScreenshotModeOnce);
        }

        function exitScreenshotModeOnce() {
            isScreenshotModeActive = false;
            document.getElementById('main-body').classList.remove('screenshot-mode');
            document.getElementById('screenshot-toast').classList.add('hidden');
            window.removeEventListener('click', exitScreenshotModeOnce);
        }

        function toggleCountry(country) {
            countryStatus[country] = !countryStatus[country];
            let shockedParticipant = null;
            participants.forEach(p => {
                const c1Alive = countryStatus[p.c1];
                const c2Alive = countryStatus[p.c2];
                const currentLives = (c1Alive ? 1 : 0) + (c2Alive ? 1 : 0);
                if (previousLivesState[p.name] === 1 && currentLives === 0) { shockedParticipant = p.name; }
            });
            saveAndRender(shockedParticipant);
        }

        function saveAndRender(triggerShakeFor = null) {
            localStorage.setItem('wc2026_status_v6', JSON.stringify(countryStatus));
            localStorage.setItem('wc2026_sim_v6', JSON.stringify(simulationData));
            renderControls();
            renderPollaBoard(triggerShakeFor);
            calculateNextRounds();
            renderAvanceTorneo();
            renderDramaTicker();
        }

        participants.forEach(p => {
            const c1Alive = countryStatus[p.c1];
            const c2Alive = countryStatus[p.c2];
            previousLivesState[p.name] = (c1Alive ? 1 : 0) + (c2Alive ? 1 : 0);
        });

        saveAndRender();
        filterRound(8);
    </script>
</body>
</html>
