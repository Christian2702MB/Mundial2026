
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial de Vidas 2026 - Polla Familiar</title>
    <!-- Tailwind CSS para diseño moderno de TV deportiva -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: #f8fafc; }
        .card-eliminated { filter: grayscale(1) opacity(0.35); text-decoration: line-through; }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">

    <!-- Encabezado Principal -->
    <div class="max-w-6xl mx-auto text-center mb-8">
        <h1 class="text-3xl md:text-5xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-blue-500 uppercase tracking-wider mb-2">
            🏆 Mundial de Vidas 2026 🏆
        </h1>
        <div class="inline-block bg-yellow-500 text-slate-900 font-extrabold text-xl md:text-2xl px-6 py-2 rounded-full shadow-lg animate-pulse">
            💰 POZO: S/. 400
        </div>
    </div>

    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- PANEL DE CONTROL (ADMINISTRADOR) -->
        <div class="bg-slate-800 p-6 rounded-2xl shadow-xl border border-slate-700 h-fit">
            <h2 class="text-xl font-bold text-green-400 mb-4 flex items-center gap-2">
                ⚙️ Panel de Control Técnico
            </h2>
            <p class="text-xs text-slate-400 mb-4">Haz clic en los botones para cambiar el estado en tiempo real:</p>
            <div id="country-controls" class="space-y-2"></div>
        </div>

        <!-- TABLERO EN VIVO DE LA FAMILIA -->
        <div class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4" id="family-board">
            <!-- Las tarjetas se generan dinámicamente aquí -->
        </div>
    </div>

    <script>
        // Configuración inicial de la polla familiar
        const participants = [
            { name: "Sergio", c1: "Japón", flag1: "🇯🇵", c2: "Inglaterra", flag2: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
            { name: "Beatriz", c1: "Argentina", flag1: "🇦🇷", c2: "Brasil", flag2: "🇧🇷" },
            { name: "Marcos", c1: "Portugal", flag1: "🇵🇹", c2: "Marruecos", flag2: "🇲🇦" },
            { name: "Jacky", c1: "Alemania", flag1: "🇩🇪", c2: "España", flag2: "🇪🇸" },
            { name: "Christian", c1: "Francia", flag1: "🇫🇷", c2: "Holanda", flag2: "🇳🇱" },
            { name: "Nataly", c1: "Portugal", flag1: "🇵🇹", c2: "Brasil", flag2: "🇧🇷" },
            { name: "Mady", c1: "Francia", flag1: "🇫🇷", c2: "España", flag2: "🇪🇸" },
            { name: "Andre", c1: "Holanda", flag1: "🇳🇱", c2: "Portugal", flag2: "🇵🇹" }
        ];

        // Estado de los países (Japón y Alemania ya eliminados en la pizarra original)
        let countryStatus = JSON.parse(localStorage.getItem('wc2026_status')) || {
            "Japón": false, "Alemania": false, "Inglaterra": true, "Argentina": true,
            "Brasil": true, "Portugal": true, "Marruecos": true, "España": true,
            "Francia": true, "Holanda": true
        };

        function saveAndRender() {
            localStorage.setItem('wc2026_status', JSON.stringify(countryStatus));
            renderControls();
            renderBoard();
        }

        function renderControls() {
            const container = document.getElementById('country-controls');
            container.innerHTML = '';
            Object.keys(countryStatus).sort().forEach(country => {
                const isAlive = countryStatus[country];
                const btnClass = isAlive ? 'bg-green-600 hover:bg-green-500' : 'bg-red-600 hover:bg-red-500';
                const label = isAlive ? 'VIVO' : 'ELIMINADO';
                
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-900/50 p-2 rounded-xl border border-slate-700/50">
                        <span class="font-medium text-sm text-slate-200">${country}</span>
                        <button onclick="toggleCountry('${country}')" class="${btnClass} text-white text-xs font-black px-3 py-1 rounded-lg transition-all duration-200 shadow">
                            ${label}
                        </button>
                    </div>
                `;
            });
        }

        function renderBoard() {
            const container = document.getElementById('family-board');
            container.innerHTML = '';

            participants.forEach(p => {
                const c1Alive = countryStatus[p.c1];
                const c2Alive = countryStatus[p.c2];
                const isGameOver = !c1Alive && !c2Alive;
                const lives = (c1Alive ? 1 : 0) + (c2Alive ? 1 : 0);

                let statusColor = 'border-green-500/30 bg-slate-800';
                let badge = `<span class="bg-green-500/20 text-green-400 text-xs px-2 py-0.5 rounded-md font-bold">Vidas: ${lives}/2</span>`;

                if (lives === 1) {
                    statusColor = 'border-yellow-500/50 bg-slate-800 animate-pulse';
                    badge = `<span class="bg-yellow-500/20 text-yellow-400 text-xs px-2 py-0.5 rounded-md font-bold">⚠️ EN CAPILLA</span>`;
                } else if (isGameOver) {
                    statusColor = 'border-red-600/40 bg-slate-950 card-eliminated';
                    badge = `<span class="bg-red-600 text-white text-xs px-2 py-0.5 rounded-md font-black tracking-widest">💀 GAME OVER</span>`;
                }

                container.innerHTML += `
                    <div class="p-5 rounded-2xl border transition-all duration-300 shadow-md ${statusColor}">
                        <div class="flex justify-between items-center mb-3">
                            <h3 class="text-lg font-black text-white uppercase">${p.name}</h3>
                            ${badge}
                        </div>
                        <div class="grid grid-cols-2 gap-2 text-center text-sm">
                            <div class="p-2 rounded-xl bg-slate-900/40 ${!c1Alive ? 'line-through text-slate-500' : 'font-bold text-slate-300'}">
                                <span class="text-xl mr-1">${p.flag1}</span> ${p.c1}
                            </div>
                            <div class="p-2 rounded-xl bg-slate-900/40 ${!c2Alive ? 'line-through text-slate-500' : 'font-bold text-slate-300'}">
                                <span class="text-xl mr-1">${p.flag2}</span> ${p.c2}
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function toggleCountry(country) {
            countryStatus[country] = !countryStatus[country];
            saveAndRender();
        }

        // Ejecución inicial
        saveAndRender();
    </script>
</body>
</html>
