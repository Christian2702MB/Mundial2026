<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mundial de Fútbol 2026 - Polla Familiar</title>
    <!-- Tailwind CSS para diseño de TV deportiva de alto rendimiento -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #f8fafc; overflow-x: hidden; }
        .tab-active { border-bottom-color: #22c55e; color: #22c55e; }
        
        /* --- ANIMACIONES INTERACTIVAS Y TRANSICIONES --- */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes earthquake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-5px) rotate(-0.5deg); }
            40% { transform: translateX(5px) rotate(0.5deg); }
            60% { transform: translateX(-3px); }
        }
        @keyframes floatWarning {
            0%, 100% { transform: translateY(0); box-shadow: 0 4px 15px rgba(245, 158, 11, 0.2); border-color: rgba(245, 158, 11, 0.4); }
            50% { transform: translateY(-4px); box-shadow: 0 8px 22px rgba(245, 158, 11, 0.4); border-color: rgba(245, 158, 11, 0.7); }
        }

        .card-animate { animation: fadeInUp 0.4s ease-out both; }
        .status-capilla { animation: floatWarning 2.5s infinite ease-in-out; background: linear-gradient(135deg, #151426 0%, #0d1220 100%) !important; }
        .status-gameover { animation: earthquake 0.5s ease-in-out both; filter: grayscale(0.5); opacity: 0.5; background: linear-gradient(135deg, #1a0808 0%, #060101 100%) !important; border-color: rgba(239, 68, 68, 0.3) !important; }
        
        .country-box { transition: all 0.25s ease; }
        .country-dead-style { filter: grayscale(0.8) opacity(0.5); text-decoration: line-through; color: #64748b; }
    </style>
</head>
<body class="p-4 md:p-8 font-sans">

    <!-- Encabezado Principal Premium UI/UX -->
    <div class="max-w-6xl mx-auto text-center mb-6 relative">
        <!-- Copa del Mundo SVG Dorada -->
        <div class="flex justify-center mb-2 drop-shadow-[0_0_20px_rgba(234,179,8,0.35)]">
            <svg class="w-14 h-14" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M6 4C6 2.89543 6.89543 2 8 2H16C17.1046 2 18 2.89543 18 4V7C18 9.61391 16.2424 11.8168 13.8519 12.4491C14.5369 13.5132 15 14.7111 15 16H17C17.5523 16 18 16.4477 18 17C18 17.5523 17.5523 18 17 18H15.936C15.4514 20.2974 13.3323 22 10.8 22C8.26767 22 6.14856 20.2974 5.66403 18H4.6C4.04772 18 3.6 17.5523 3.6 17C3.6 16.4477 4.04772 16 4.6 16H6.6C6.6 14.7111 7.06314 13.5132 7.74811 12.4491C5.35759 11.8168 3.6 9.61391 3.6 7V4H6ZM8 4V7C8 9.20914 9.79086 11 12 11C14.2091 11 16 9.20914 16 7V4H8ZM10.8 16C9.14315 16 7.8 14.6569 7.8 13C7.8 12.1963 8.11732 11.4669 8.63354 10.9292C9.25688 11.6062 10.1384 12 11.1 12C12.0616 12 12.9431 11.6062 13.5665 10.9292C14.0827 11.4669 14.4 12.1963 14.4 13C14.4 14.6569 13.0569 16 11.4 16H10.8Z" fill="url(#goldGradient)"/>
                <defs>
                    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#FDE047" />
                        <stop offset="50%" stop-color="#EAB308" />
                        <stop offset="100%" stop-color="#A16207" />
                    </linearGradient>
                </defs>
            </svg>
        </div>
        <h1 class="text-3xl md:text-4xl font-black text-transparent bg-clip-text bg-gradient-to-r from-green-400 via-cyan-400 to-blue-500 uppercase tracking-wider mb-1">
            MUNDIAL DE FÚTBOL 2026
        </h1>
        <div class="flex items-center justify-center gap-3 mb-2">
            <span class="bg-slate-800 text-slate-400 text-[10px] font-mono px-2.5 py-0.5 rounded-md border border-slate-700 tracking-wider">
                v5.0 - UX max
            </span>
            <div class="bg-gradient-to-r from-yellow-500 to-amber-500 text-slate-950 font-black text-xs px-4 py-0.5 rounded-full shadow-lg">
                💰 POZO: S/. 400
            </div>
        </div>
    </div>

    <!-- Pestañas de Navegación Estilizadas -->
    <div class="max-w-6xl mx-auto flex border-b border-slate-800 mb-6 text-sm md:text-base font-black tracking-wide">
        <button onclick="switchTab('polla')" id="btn-tab-polla" class="flex-1 py-3 text-center border-b-4 transition-all duration-200 text-green-400 border-green-500">
            📊 Mis Elecciones (Posiciones)
        </button>
        <button onclick="switchTab('avance')" id="btn-tab-avance" class="flex-1 py-3 text-center border-b-4 transition-all duration-200 text-slate-400 border-transparent hover:text-slate-200">
            🏆 Avance del Torneo
        </button>
    </div>

    <!-- Layout General -->
    <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-3 gap-6">
        
        <!-- PANEL DE CONTROL TÉCNICO COMPACTO -->
        <div class="bg-slate-900/90 p-4 rounded-2xl shadow-2xl border border-slate-800 h-fit backdrop-blur-md transition-all duration-300">
            <button onclick="toggleControlPanel()" class="w-full flex justify-between items-center text-left focus:outline-none py-1 group">
                <div class="flex items-center gap-2">
                    <span class="text-base group-hover:rotate-12 transition-transform">⚙️</span>
                    <h2 class="text-sm font-black text-green-400 tracking-wide uppercase">Panel Técnico Opciones</h2>
                </div>
                <span id="panel-arrow" class="text-[10px] font-bold bg-slate-800 text-slate-400 px-2 py-0.5 rounded border border-slate-700">🔽 MOSTRAR</span>
            </button>
            
            <div id="panel-content" class="hidden mt-4 pt-3 border-t border-slate-800/60">
                <p class="text-[11px] text-slate-400 mb-3 font-medium">Modifica los estados; la tabla de posiciones se reordenará sola:</p>
                <div id="country-controls" class="space-y-1.5"></div>
            </div>
        </div>

        <!-- HOJA 1: MI POLLA (CON TABLA DE POSICIONES EN TIEMPO REAL) -->
        <div id="tab-content-polla" class="lg:col-span-2 grid grid-cols-1 sm:grid-cols-2 gap-4">
            <!-- Inyección dinámica con auto-ordenamiento por vidas -->
        </div>

        <!-- HOJA 2: AVANCE DEL TORNEO (ESTILO BRACKETS PREMIUM DE CRUCES DIRECTOS) -->
        <div id="tab-content-avance" class="lg:col-span-2 bg-slate-900/40 p-5 rounded-2xl border border-slate-800 hidden">
            <div class="flex flex-col sm:flex-row justify-between sm:items-center border-b border-slate-800 pb-3 mb-4 gap-2">
                <div>
                    <h2 class="text-base font-black text-slate-200">🔀 Simulador de Llaves Directas</h2>
                    <div id="live-pool-counter" class="text-[10px] text-emerald-400 font-bold mt-0.5"></div>
                </div>
                
                <div class="flex bg-slate-950 p-1 rounded-lg border border-slate-800 text-[10px] sm:text-[11px] font-bold overflow-x-auto">
                    <button onclick="filterRound(16)" id="r-btn-16" class="px-2 py-1 rounded bg-slate-800 text-green-400 whitespace-nowrap">16avos</button>
                    <button onclick="filterRound(8)" id="r-btn-8" class="px-2 py-1 rounded text-slate-400 whitespace-nowrap">Octavos</button>
                    <button onclick="filterRound(4)" id="r-btn-4" class="px-2 py-1 rounded text-slate-400 whitespace-nowrap">Cuartos</button>
                    <button onclick="filterRound(2)" id="r-btn-2" class="px-2 py-1 rounded text-slate-400 whitespace-nowrap">Semifinal</button>
                    <button onclick="filterRound(1)" id="r-btn-1" class="px-2 py-1 rounded text-slate-400 whitespace-nowrap">🔥 Final</button>
                </div>
            </div>
            
            <div id="bracket-matches-container" class="space-y-3"></div>
            
            <!-- Botón de Reinicio Estilizado de UI Avanzada -->
            <div class="mt-6 pt-4 border-t border-slate-800/80 flex justify-end">
                <button onclick="resetSimulation()" class="flex items-center gap-1.5 text-[10px] font-black uppercase tracking-wider bg-rose-950/30 text-rose-400 hover:bg-rose-900/40 border border-rose-900/40 px-3 py-1.5 rounded-lg transition-all active:scale-95">
                    <span>🗑️</span> Reiniciar Predicciones de Cruces
                </button>
            </div>
        </div>

    </div>

    <script>
        const participants = [
            { name: "Sergio", c1: "Japón", flag1: "🇯🇵", c2: "Inglaterra", flag2: "🏴󠁧󠁢󠁥󠁮󠁧󠁿" },
            { name: "Beatriz", c1: "Argentina", flag1: "🇦🇷", c2: "Brasil", flag2: "🇧🇷" },
            { name: "Marcos", c1: "Portugal", flag1: "🇵🇹", c2: "Marruecos", flag2: "🇲🇦" },
            { name: "Jacky", c1: "Alemania", flag1: "🇩🇪", c2: "España", flag2: "🇪🇸" },
            { name: "Christian", c1: "Francia", flag1: "🇫🇷", c2: "Holanda", flag2: "🇳🇱" },
            { name: "Nataly", c1: "Portugal", flag1: "🇵🇹", c2: "Brasil", flag2: "🇧🇷" },
            { name: "Mady", c1: "Francia", flag1: "🇫🇷", c2: "España", flag2: "🇪🇸" },
            { name: "Andre", c1: "Holanda", flag1: "🇳🇱", c2: "Portugal", flag2: "🇵🇹" }
        ];

        const flags = { "Japón": "🇯🇵", "Inglaterra": "🏴󠁧󠁢󠁥󠁮󠁧󠁿", "Argentina": "🇦🇷", "Brasil": "🇧🇷", "Portugal": "🇵🇹", "Marruecos": "🇲🇦", "Alemania": "🇩🇪", "España": "🇪🇸", "Francia": "🇫🇷", "Holanda": "🇳🇱", "Suecia": "🇸🇪", "Sudáfrica": "🇿🇦", "Canadá": "🇨🇦", "Países Bajos": "🇳🇱", "Croacia": "🇭🇷", "Austria": "🇦🇹", "Estados Unidos": "🇺🇸", "Bosnia": "🇧🇦", "Bélgica": "🇧🇪", "Senegal": "🇸🇳", "Costa de Marfil": "🇨🇮", "Noruega": "🇳🇴", "México": "🇲🇽", "Ecuador": "🇪🇨", "RD Congo": "🇨🇩", "Cabo Verde": "🇨🇻", "Australia": "🇦🇺", "Egipto": "🇪🇬", "Suiza": "🇨🇭", "Argelia": "🇩🇿", "Colombia": "🇨🇴", "Ghana": "🇬🇭", "Paraguay": "🇵🇾", "Por definir": "🏳️" };

        let countryStatus = JSON.parse(localStorage.getItem('wc2026_status_v5')) || {
            "Japón": false, "Alemania": false, "Inglaterra": true, "Argentina": true, "Brasil": true, "Portugal": true, "Marruecos": true, "España": true, "Francia": true, "Holanda": true
        };

        const initialSimData = {
            r16: [
                { id: 1, t1: "Alemania", t2: "Paraguay", w: "Paraguay", date: "29 JUN" },
                { id: 2, t1: "Francia", t2: "Suecia", w: "Francia", date: "30 JUN" },
                { id: 3, t1: "Sudáfrica", t2: "Canadá", w: "Canadá", date: "28 JUN" },
                { id: 4, t1: "Países Bajos", t2: "Marruecos", w: "Marruecos", date: "29 JUN" },
                { id: 5, t1: "Portugal", t2: "Croacia", w: null, date: "2 JUL" },
                { id: 6, t1: "España", t2: "Austria", w: null, date: "2 JUL" },
                { id: 7, t1: "Estados Unidos", t2: "Bosnia", w: null, date: "1 JUL" },
                { id: 8, t1: "Bélgica", t2: "Senegal", w: null, date: "1 JUL" },
                { id: 9, t1: "Brasil", t2: "Japón", w: "Brasil", date: "29 JUN" },
                { id: 10, t1: "Costa de Marfil", t2: "Noruega", w: null, date: "30 JUN" },
                { id: 11, t1: "México", t2: "Ecuador", w: null, date: "30 JUN" },
                { id: 12, t1: "Inglaterra", t2: "RD Congo", w: null, date: "1 JUL" },
                { id: 13, t1: "Argentina", t2: "Cabo Verde", w: null, date: "3 JUL" },
                { id: 14, t1: "Australia", t2: "Egipto", w: null, date: "3 JUL" },
                { id: 15, t1: "Suiza", t2: "Argelia", w: null, date: "2 JUL" },
                { id: 16, t1: "Colombia", t2: "Ghana", w: null, date: "3 JUL" }
            ],
            r8: Array(8).fill(null).map((_, i) => ({ id: i+1, t1: "Por definir", t2: "Por definir", w: null, date: "4 JUL - 7 JUL" })),
            r4: Array(4).fill(null).map((_, i) => ({ id: i+1, t1: "Por definir", t2: "Por definir", w: null, date: "9 JUL - 11 JUL" })),
            r2: Array(2).fill(null).map((_, i) => ({ id: i+1, t1: "Por definir", t2: "Por definir", w: null, date: "14 JUL / 15 JUL" })),
            r1: [{ id: 1, t1: "Por definir", t2: "Por definir", w: null, date: "19 JUL - GRAN FINAL" }]
        };

        let simulationData = JSON.parse(localStorage.getItem('wc2026_sim_v5')) || JSON.parse(JSON.stringify(initialSimData));
        let currentActiveRound = 16;
        let previousLivesState = {};

        function toggleControlPanel() {
            const content = document.getElementById('panel-content');
            const arrow = document.getElementById('panel-arrow');
            if (content.classList.contains('hidden')) {
                content.classList.remove('hidden');
                arrow.innerHTML = '🔼 OCULTAR';
            } else {
                content.classList.add('hidden');
                arrow.innerHTML = '🔽 MOSTRAR';
            }
        }

        function getOwnersText(country) {
            if (!country || country === "Por definir") return "";
            const owners = participants.filter(p => p.c1 === country || p.c2 === country).map(p => p.name);
            return owners.length > 0 ? `(${owners.join(', ')})` : "";
        }

        function switchTab(tab) {
            const pollaContent = document.getElementById('tab-content-polla');
            const avanceContent = document.getElementById('tab-content-avance');
            const btnPolla = document.getElementById('btn-tab-polla');
            const btnAvance = document.getElementById('btn-tab-avance');

            if(tab === 'polla') {
                pollaContent.classList.remove('hidden');
                avanceContent.classList.add('hidden');
                btnPolla.className = "flex-1 py-3 text-center border-b-4 transition-all duration-200 text-green-400 border-green-500 font-black tracking-wide";
                btnAvance.className = "flex-1 py-3 text-center border-b-4 transition-all duration-200 text-slate-400 border-transparent hover:text-slate-200 font-black tracking-wide";
            } else {
                pollaContent.classList.add('hidden');
                avanceContent.classList.remove('hidden');
                btnAvance.className = "flex-1 py-3 text-center border-b-4 transition-all duration-200 text-green-400 border-green-500 font-black tracking-wide";
                btnPolla.className = "flex-1 py-3 text-center border-b-4 transition-all duration-200 text-slate-400 border-transparent hover:text-slate-200 font-black tracking-wide";
                renderAvanceTorneo(); 
            }
        }

        function filterRound(round) {
            currentActiveRound = round;
            [16, 8, 4, 2, 1].forEach(r => {
                const btn = document.getElementById(`r-btn-${r}`);
                if(r === round) { btn.className = "px-2 py-1 rounded bg-slate-800 text-green-400"; }
                else { btn.className = "px-2 py-1 rounded text-slate-400"; }
            });
            renderAvanceTorneo();
        }

        function resetSimulation() {
            if (confirm("¿Estás seguro de que quieres limpiar tus predicciones del simulador?")) {
                simulationData = JSON.parse(JSON.stringify(initialSimData));
                saveAndRender();
            }
        }

        function saveAndRender(triggerShakeFor = null) {
            localStorage.setItem('wc2026_status_v5', JSON.stringify(countryStatus));
            localStorage.setItem('wc2026_sim_v5', JSON.stringify(simulationData));
            renderControls();
            renderPollaBoard(triggerShakeFor);
            calculateNextRounds();
            renderAvanceTorneo();
        }

        function renderControls() {
            const container = document.getElementById('country-controls');
            if (!container) return;
            container.innerHTML = '';
            Object.keys(countryStatus).sort().forEach(country => {
                const isAlive = countryStatus[country];
                const btnClass = isAlive ? 'bg-emerald-600' : 'bg-rose-600';
                container.innerHTML += `
                    <div class="flex justify-between items-center bg-slate-950/40 p-2 rounded-xl border border-slate-800/60">
                        <span class="font-bold text-xs text-slate-300">${country}</span>
                        <button onclick="toggleCountry('${country}')" class="${btnClass} text-white text-[10px] font-black px-3 py-1 rounded-lg transition-all transform active:scale-95">
                            ${isAlive ? 'VIVO' : 'ELIMINADO'}
                        </button>
                    </div>
                `;
            });
        }

        /* TABLA DE POSICIONES INTELIGENTE CON ORDENAMIENTO EN TIEMPO REAL (LÍDERES ARRIBA) */
        function renderPollaBoard(triggerShakeFor) {
            const container = document.getElementById('tab-content-polla');
            if (!container) return;
            container.innerHTML = '';

            // Mapeamos los participantes calculando sus vidas actuales para poder ordenarlos
            const leaderboard = participants.map(p => {
                const c1Alive = countryStatus[p.c1];
                const c2Alive = countryStatus[p.c2];
                const lives = (c1Alive ? 1 : 0) + (c2Alive ? 1 : 0);
                return { ...p, lives, c1Alive, c2Alive };
            });

            // Ordenamos de mayor a menor cantidad de vidas
            leaderboard.sort((a, b) => b.lives - a.lives);

            leaderboard.forEach((p, index) => {
                let stateClass = 'border-slate-800 bg-slate-900/40';
                let badge = "";
                let heartIcons = "";

                // Configuración de UI semántica según las vidas del competidor
                if (p.lives === 2) {
                    badge = `<span class="bg-emerald-500/10 text-emerald-400 text-[11px] px-2.5 py-0.5 rounded-full border border-emerald-500/20 font-black">PUESTO #${index + 1}</span>`;
                    heartIcons = "❤️❤️";
                } else if (p.lives === 1) {
                    stateClass = 'status-capilla';
                    badge = `<span class="bg-amber-500/20 text-amber-400 text-[11px] px-2.5 py-0.5 rounded-full border border-amber-500/30 font-black">⚠️ CAPILLA</span>`;
                    heartIcons = "❤️🖤";
                } else {
                    stateClass = 'status-gameover';
                    badge = `<span class="bg-rose-950 text-rose-400 text-[11px] px-2.5 py-0.5 rounded-full border border-rose-500/20 font-black">💀 FUERA</span>`;
                    heartIcons = "🖤🖤";
                }

                // Si este familiar acaba de quebrar, disparamos el sismo visual
                if (triggerShakeFor === p.name) { stateClass += ' status-gameover'; }

                container.innerHTML += `
                    <div class="card-animate ${stateClass} p-4 rounded-xl border shadow-xl transition-all" style="animation-delay: ${index * 0.02}s">
                        <div class="flex justify-between items-center mb-3">
                            <div class="flex items-center gap-2">
                                <span class="text-xs font-mono font-bold text-slate-500">${index == 0 ? '👑' : `#${index + 1}`}</span>
                                <h3 class="text-base font-black text-slate-200 uppercase">${p.name}</h3>
                            </div>
                            <div class="flex items-center gap-3">
                                <span class="text-xs tracking-wider font-mono">${heartIcons}</span>
                                ${badge}
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <!-- Selección de Selección 1 -->
                            <div class="country-box p-2.5 rounded-lg bg-slate-950/40 border border-slate-800/40 flex items-center justify-center gap-2 ${!p.c1Alive ? 'country-dead-style' : 'text-slate-200 font-bold'}">
                                <span class="text-lg flex-shrink-0">${p.flag1}</span>
                                <span class="text-xs tracking-wide whitespace-nowrap">${p.c1}</span>
                            </div>
                            <!-- Selección de Selección 2 -->
                            <div class="country-box p-2.5 rounded-lg bg-slate-950/40 border border-slate-800/40 flex items-center justify-center gap-2 ${!p.c2Alive ? 'country-dead-style' : 'text-slate-200 font-bold'}">
                                <span class="text-lg flex-shrink-0">${p.flag2}</span>
                                <span class="text-xs tracking-wide whitespace-nowrap">${p.c2}</span>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function calculateNextRounds() {
            for (let i = 0; i < 8; i++) {
                simulationData.r8[i].t1 = simulationData.r16[i*2].w || "Por definir";
                simulationData.r8[i].t2 = simulationData.r16[i*2 + 1].w || "Por definir";
            }
            for (let i = 0; i < 4; i++) {
                simulationData.r4[i].t1 = simulationData.r8[i*2].w || "Por definir";
                simulationData.r4[i].t2 = simulationData.r8[i*2 + 1].w || "Por definir";
            }
            for (let i = 0; i < 2; i++) {
                simulationData.r2[i].t1 = simulationData.r4[i*2].w || "Por definir";
                simulationData.r2[i].t2 = simulationData.r4[i*2 + 1].w || "Por definir";
            }
            simulationData.r1[0].t1 = simulationData.r2[0].w || "Por definir";
            simulationData.r1[0].t2 = simulationData.r2[1].w || "Por definir";

            [simulationData.r8, simulationData.r4, simulationData.r2, simulationData.r1].forEach(round => {
                round.forEach(m => { if (m.w && m.w !== m.t1 && m.w !== m.t2) m.w = null; });
            });
        }

        function simulateWinner(roundKey, matchId, teamIndex) {
            const roundArr = simulationData[roundKey];
            const match = roundArr.find(m => m.id === matchId);
            const selectedTeam = teamIndex === 1 ? match.t1 : match.t2;
            
            if (selectedTeam === "Por definir") return;

            if (match.w === selectedTeam) { match.w = null; } 
            else { match.w = selectedTeam; }

            saveAndRender();
        }

        function renderAvanceTorneo() {
            const container = document.getElementById('bracket-matches-container');
            if (!container) return;
            container.innerHTML = '';
            
            let currentRoundKey = `r${currentActiveRound}`;
            let currentData = simulationData[currentRoundKey];

            const aliveCount = Object.values(countryStatus).filter(v => v).length;
            const counterDiv = document.getElementById('live-pool-counter');
            if (counterDiv) counterDiv.innerHTML = `📊 Quedan ${aliveCount} de 10 países con vida global en el pozo`;

            currentData.forEach(m => {
                const f1 = flags[m.t1] || "🏳️";
                const f2 = flags[m.t2] || "🏳️";
                
                const t1Selected = m.w === m.t1 && m.w !== null;
                const t2Selected = m.w === m.t2 && m.w !== null;

                let labelEstado = "";
                let badgeEstilo = "";
                if (m.t1 === "Por definir" || m.t2 === "Por definir") {
                    labelEstado = "⏳ Por definir";
                    badgeEstilo = "text-slate-500 bg-slate-950";
                } else if (!m.w) {
                    labelEstado = `🕒 Por jugar (${m.date})`;
                    badgeEstilo = "text-yellow-400 bg-yellow-950/40 border border-yellow-500/20";
                } else {
                    labelEstado = `✅ Definido (${m.date})`;
                    badgeEstilo = "text-emerald-400 bg-emerald-950/40 border border-emerald-500/20";
                }

                // MEJORA UX CLIC DE FILA COMPLETA Y REPRESENTANTES EN SEGUNDA LINEA
                container.innerHTML += `
                    <div class="bg-slate-950/40 border border-slate-800/80 rounded-xl p-3 flex flex-col md:flex-row items-center justify-between gap-3 shadow-md">
                        <div class="text-[10px] font-black px-2.5 py-1 rounded-md uppercase tracking-wider ${badgeEstilo}">${labelEstado}</div>
                        
                        <div class="flex-1 w-full grid grid-cols-1 sm:grid-cols-2 gap-2 max-w-xl">
                            <!-- Contenedor País 1 (Clic de bloque completo con Hover) -->
                            <div onclick="simulateWinner('${currentRoundKey}', ${m.id}, 1)" 
                                 class="cursor-pointer p-2.5 rounded-lg bg-slate-900/60 border ${t1Selected ? 'border-green-500/50 bg-green-950/10' : 'border-slate-800'} flex items-center justify-between hover:border-slate-700 hover:bg-slate-900 transition-all group">
                                <div class="flex items-center gap-2 truncate">
                                    <span class="text-base transition-transform group-hover:scale-110">${f1}</span>
                                    <div class="flex flex-col truncate">
                                        <span class="text-xs font-black text-slate-200 tracking-wide">${m.t1}</span>
                                        ${getOwnersText(m.t1) ? `<span class="text-[9px] text-amber-400/80 font-bold mt-0.5">${getOwnersText(m.t1)}</span>` : ''}
                                    </div>
                                </div>
                                <div class="w-3.5 h-3.5 rounded-full border-2 transition-all ${t1Selected ? 'bg-green-500 border-green-400 shadow-[0_0_10px_#22c55e]' : 'border-slate-700 bg-transparent'}"></div>
                            </div>

                            <!-- Contenedor País 2 (Clic de bloque completo con Hover) -->
                            <div onclick="simulateWinner('${currentRoundKey}', ${m.id}, 2)" 
                                 class="cursor-pointer p-2.5 rounded-lg bg-slate-900/60 border ${t2Selected ? 'border-green-500/50 bg-green-950/10' : 'border-slate-800'} flex items-center justify-between hover:border-slate-700 hover:bg-slate-900 transition-all group">
                                <div class="flex items-center gap-2 truncate">
                                    <span class="text-base transition-transform group-hover:scale-110">${f2}</span>
                                    <div class="flex flex-col truncate">
                                        <span class="text-xs font-black text-slate-200 tracking-wide">${m.t2}</span>
                                        ${getOwnersText(m.t2) ? `<span class="text-[9px] text-amber-400/80 font-bold mt-0.5">${getOwnersText(m.t2)}</span>` : ''}
                                    </div>
                                </div>
                                <div class="w-3.5 h-3.5 rounded-full border-2 transition-all ${t2Selected ? 'bg-green-500 border-green-400 shadow-[0_0_10px_#22c55e]' : 'border-slate-700 bg-transparent'}"></div>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        function toggleCountry(country) {
            countryStatus[country] = !countryStatus[country];
            let shockedParticipant = null;
            participants.forEach(p => {
                const c1Alive = countryStatus[p.c1];
                const c2Alive = countryStatus[p.c2];
                const currentLives = (c1Alive ? 1 : 0) + (c2Alive ? 1 : 0);
                if (previousLivesState[p.name] === 1 && currentLives === 0) { shockedParticipant = p.name; }
            });
            saveAndRender(shockedParticipant);
        }

        participants.forEach(p => {
            const c1Alive = countryStatus[p.c1];
            const c2Alive = countryStatus[p.c2];
            previousLivesState[p.name] = (c1Alive ? 1 : 0) + (c2Alive ? 1 : 0);
        });

        saveAndRender();
    </script>
</body>
</html>
